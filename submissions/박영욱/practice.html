<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>박영욱 — 소개</title>
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap"
            rel="stylesheet" />
        <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Mono', monospace;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .wrapper {
      max-width: 560px;
      width: 100%;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2rem;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #e5e5e5;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: #666;
      flex-shrink: 0;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      line-height: 1;
      letter-spacing: -0.01em;
      color: #1a1a1a;
    }

    .name em {
      font-style: italic;
      color: #888;
    }

    .role {
      font-size: 11px;
      color: #aaa;
      margin-top: 5px;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #ebebeb;
      margin-bottom: 1.75rem;
    }

    .bio {
      font-size: 13px;
      line-height: 1.9;
      color: #555;
      margin-bottom: 2rem;
    }

    .section {
      margin-bottom: 1.5rem;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 0.6rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid #ddd;
      color: #555;
      background: #f9f9f9;
    }

    .tag.blue  { border-color: #B5D4F4; color: #185FA5; background: #E6F1FB; }
    .tag.green { border-color: #C0DD97; color: #3B6D11; background: #EAF3DE; }
    .tag.amber { border-color: #FAC775; color: #854F0B; background: #FAEEDA; }

    .links {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .link {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: #888;
      border-bottom: 1px solid #ddd;
      padding-bottom: 1px;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s;
    }

    .link:hover {
      color: #1a1a1a;
      border-color: #aaa;
    }
  </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="top">
                <div class="avatar">박</div>
                <div>
                    <div class="name">박영욱</div>
                    <div class="role">Developer · Builder · Explorer</div>
                </div>
            </div>

            <div class="divider"></div>

            <p class="bio">
                AI 도구와 개발 워크플로우에 관심이 많은 사람.<br />
                무언가를 직접 만들어보는 것을 좋아하며,<br />
                지금은 Anthropic 생태계를 깊이 탐험 중.
            </p>

            <div class="section">
                <p class="section-label">기술 스택</p>
                <div class="tags">
                    <span class="tag blue">Claude / MCP</span>
                    <span class="tag blue">Claude Code</span>
                    <span class="tag blue">Git</span>
                    <span class="tag blue">macOS</span>
                </div>
            </div>

            <div class="section">
                <p class="section-label">관심 영역</p>
                <div class="tags">
                    <span class="tag green">AI 워크플로우</span>
                    <span class="tag green">개발자 도구</span>
                    <span class="tag green">지식 시각화</span>
                </div>
            </div>

            <div class="section">
                <p class="section-label">프로젝트</p>
                <div class="tags">
                    <span class="tag amber">나만의무언가</span>
                    <span class="tag amber">개인 자동화</span>
                </div>
            </div>

            <div class="section">
                <p class="section-label">연락처</p>
                <div class="links">
                    <a class="link" href="https://github.com/"
                        target="_blank">GitHub</a>
                    <a class="link" href="mailto:your@email.com">이메일</a>
                    <a class="link" href="https://linkedin.com/"
                        target="_blank">LinkedIn</a>
                </div>
            </div>
        </div>
    </body>
</html>
